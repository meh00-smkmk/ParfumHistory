<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sillage - Historique Parfums</title>
  <style>
    :root {
      --color-background: #1a1a2e;
      --color-primary: #16213e;
      --color-dark: #0f3460;
      --color-accent: #d4af37;
      --color-text: #e0e0e0;
      --color-border: rgba(255, 255, 255, 0.1);
      --color-surface: rgba(255, 255, 255, 0.05);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background-color: var(--color-background);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .ch-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .ch-header h1 {
      color: var(--color-accent);
      margin: 0;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    .ch-header p {
      color: #888;
      margin: 0.5rem 0 0;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .ch-main {
      width: 100%;
      max-width: 400px;
    }
    .ch-intro {
      background: rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.3);
      color: var(--color-accent);
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }
    .ch-error {
      background: rgba(231,76,60,0.1);
      border: 1px dashed #e74c3c;
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
      color: #ff6b6b;
      display: none;
    }
    .error-icon { display: block; font-size: 2.5rem; margin-bottom: 1rem; }
    .ch-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .ch-item {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .ch-item-icon {
      font-size: 1.5rem;
      background: rgba(212,175,55,0.15);
      width: 45px;
      height: 45px;
      min-width: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid rgba(212,175,55,0.3);
    }
    .ch-item-details h3 {
      margin: 0 0 0.4rem;
      color: var(--color-accent);
      font-size: 1.1rem;
    }
    .ch-item-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.85rem;
      color: #aaa;
    }
    #loading {
      text-align: center;
      color: #888;
    }
  </style>
</head>
<body>
  <header class="ch-header">
    <h1>Sillage</h1>
    <p>Votre Historique Parfums</p>
  </header>

  <main class="ch-main">
    <div id="error-container" class="ch-error">
      <span class="error-icon">⚠️</span>
      <p id="error-message">Une erreur s'est produite lors du chargement.</p>
    </div>

    <div id="content-container">
      <div class="ch-intro">
        Voici la liste exacte des parfums que vous avez achetés. Montrez cet écran lors de votre prochaine visite !
      </div>
      <p id="loading">Chargement...</p>
      <div id="history-list" class="ch-list"></div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const errorContainer = document.getElementById('error-container');
      const errorMessage = document.getElementById('error-message');
      const contentContainer = document.getElementById('content-container');
      const historyList = document.getElementById('history-list');
      const loading = document.getElementById('loading');

      function showError(msg) {
        errorContainer.style.display = 'block';
        contentContainer.style.display = 'none';
        errorMessage.textContent = msg;
      }

      try {
        const searchParams = window.location.search || window.location.hash;
        if (!searchParams || !searchParams.includes('?data=')) {
          throw new Error("Aucune donnée trouvée. Veuillez scanner un QR code valide.");
        }

        const b64Data = searchParams.split('?data=')[1];
        const decodedStr = atob(b64Data);
        const data = JSON.parse(decodedStr);

        if (!Array.isArray(data)) {
          throw new Error("Format de données invalide.");
        }

        loading.style.display = 'none';

        if (data.length === 0) {
          showError("L'historique est vide.");
          return;
        }

        data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'ch-item';
          
          let metaHtml = '';
          if (item.s) metaHtml += `<span>Taille: ${item.s}ml</span>`;
          metaHtml += `<span>Quantité: ${item.q}</span>`;

          div.innerHTML = `
            <div class="ch-item-icon">✨</div>
            <div class="ch-item-details">
              <h3>${decodeURIComponent(item.n)}</h3>
              <div class="ch-item-meta">${metaHtml}</div>
            </div>
          `;
          historyList.appendChild(div);
        });

      } catch (e) {
        console.error(e);
        showError(e.message || "Impossible de charger l'historique.");
      }
    });
  </script>
</body>
</html>
