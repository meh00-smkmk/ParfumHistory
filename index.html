<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historique Parfums</title>
  <style>
    :root {
      --color-background: #0a0a0f;
      --color-primary: #12121e;
      --color-accent: #d4af37;
      --color-text: #e0e0e0;
      --color-border: rgba(255, 255, 255, 0.08);
      --color-surface: rgba(255, 255, 255, 0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background-color: var(--color-background); color: var(--color-text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2.5rem 1rem; }
    .ch-header { text-align: center; margin-bottom: 2.5rem; width: 100%; max-width: 450px; }
    #shop-name { color: var(--color-accent); margin: 0; font-size: 2.2rem; letter-spacing: 1px; font-weight: 700; }
    .ch-header p { color: #888; margin: 0.6rem 0 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 500; }
    .ch-main { width: 100%; max-width: 450px; }
    .ch-intro { background: rgba(212,175,55,0.06); border: 1px solid rgba(212,175,55,0.15); color: #c4a74d; padding: 1.2rem; border-radius: 12px; font-size: 0.95rem; text-align: center; margin-bottom: 2rem; line-height: 1.5; }
    .ch-error { background: rgba(231,76,60,0.1); border: 1px dashed #e74c3c; padding: 2.5rem; border-radius: 16px; text-align: center; color: #ff6b6b; display: none; }
    .error-icon { display: block; font-size: 3rem; margin-bottom: 1.2rem; }
    .ch-list { display: flex; flex-direction: column; gap: 1.2rem; }
    .ch-item { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 16px; padding: 1.5rem; display: flex; align-items: center; gap: 1.2rem; transition: transform 0.2s; }
    .ch-item-icon { font-size: 1.6rem; background: rgba(212,175,55,0.1); width: 50px; height: 50px; min-width: 50px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid rgba(212,175,55,0.2); }
    .ch-item-details { flex-grow: 1; }
    .ch-item-details h3 { margin: 0 0 0.5rem; color: #fff; font-size: 1.2rem; font-weight: 600; }
    .ch-item-meta { display: flex; gap: 1.2rem; font-size: 0.9rem; color: #999; }
    #loading { text-align: center; color: #666; font-style: italic; }
    .footer-logo { margin-top: auto; padding-top: 3rem; opacity: 0.3; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; color: #888; }
  </style>
</head>
<body>
  <header class="ch-header">
    <h1 id="shop-name">Votre Boutique</h1>
    <p>Historique de Parfum</p>
  </header>

  <main class="ch-main">
    <div id="error-container" class="ch-error">
      <span class="error-icon">⚠️</span>
      <div id="error-message">Désolé, une erreur est survenue lors du chargement des données.</div>
    </div>

    <div id="content-container">
      <div class="ch-intro">
        Voici la sélection de parfums de votre dernière visite. Présentez cet écran pour retrouver exactement vos mélanges !
      </div>
      <p id="loading">Chargement des parfums...</p>
      <div id="history-list" class="ch-list"></div>
    </div>
  </main>

  <footer class="footer-logo">Sillage Technology</footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const shopNameEl = document.getElementById('shop-name');
      const errorContainer = document.getElementById('error-container');
      const errorMessage = document.getElementById('error-message');
      const contentContainer = document.getElementById('content-container');
      const historyList = document.getElementById('history-list');
      const loading = document.getElementById('loading');

      function showError(msg) {
        errorContainer.style.display = 'block';
        contentContainer.style.display = 'none';
        errorMessage.innerHTML = `<p>${msg}</p><button onclick="location.reload()" style="margin-top:15px;background:none;border:1px solid #ff6b6b;color:#ff6b6b;padding:5px 10px;border-radius:4px;cursor:pointer">Réessayer</button>`;
      }

      function safeDecode(str) {
        try {
          // Add padding back
          str = str.replace(/-/g, '+').replace(/_/g, '/');
          while (str.length % 4) str += '=';
          return decodeURIComponent(escape(atob(str)));
        } catch (e) {
          console.error("Decode error", e);
          return null;
        }
      }

      try {
        const searchParams = window.location.search || window.location.hash;
        if (!searchParams || !searchParams.includes('?data=')) {
          throw new Error("Lien incomplet. Veuillez scanner un QR code sur votre ticket de caisse.");
        }

        const b64Data = searchParams.split('?data=')[1];
        const decodedStr = safeDecode(b64Data);
        if (!decodedStr) throw new Error("Données corrompues ou format incorrect.");
        
        const data = JSON.parse(decodedStr);
        const items = data.items || [];
        const sn = data.sn ? decodeURIComponent(data.sn) : "Votre Boutique";

        document.title = "Historique chez " + sn;
        shopNameEl.textContent = sn;
        loading.style.display = 'none';

        if (items.length === 0) {
          showError("Aucun produit trouvé dans cet historique.");
          return;
        }

        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'ch-item';
          const metaHtml = `<span>${item.s ? item.s + 'ml' : ''}</span> <span>Quantité: ${item.q}</span>`;
          div.innerHTML = `
            <div class="ch-item-icon">✨</div>
            <div class="ch-item-details">
              <h3>${decodeURIComponent(item.n)}</h3>
              <div class="ch-item-meta">${metaHtml}</div>
            </div>`;
          historyList.appendChild(div);
        });

      } catch (e) {
        console.error(e);
        showError(e.message || "Problème de lecture des données.");
      }
    });
  </script>
</body>
</html>
